name: Build and Release

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Build and UPX
        run: |
          mkdir -p build_assets
          COMMID=$(git describe --always --dirty)
          
          # 修改输出文件名，增加系统和架构后缀，方便区分
          # 如果你希望在本地依然叫 xray，可以保持不变，但在上传时手动重命名
          go build -o build_assets/xray-${{ matrix.goos }}-${{ matrix.goarch }} -trimpath -buildvcs=false -gcflags="all=-l=4" -ldflags="-X github.com/xtls/xray-core/core.build=${COMMID} -s -w -buildid=" -v ./main
          
          # 执行 UPX 压缩
          upx --lzma --best build_assets/xray-${{ matrix.goos }}-${{ matrix.goarch }}

      # --- 已移除 Create ZIP archive 步骤 ---

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # 指向 build_assets 目录下的二进制文件
          file: build_assets/xray-${{ matrix.goos }}-${{ matrix.goarch }}
          tag: ${{ github.ref }}
          asset_name: xray-${{ matrix.goos }}-${{ matrix.goarch }} # 指定在 Release 页面显示的名字

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4 # 建议使用 v4，v7 目前并非官方主流版本
        with:
          name: xray-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build_assets/xray-${{ matrix.goos }}-${{ matrix.goarch }}
